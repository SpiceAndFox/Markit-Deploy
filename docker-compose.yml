services:
  markit:
    image: markit:qwen25-a100
    build:
      context: .
      dockerfile: Dockerfile
      extra_hosts:
        - "host.docker.internal:host-gateway"
      args:
        TORCH_VERSION: ${TORCH_VERSION:-2.6.0}
        TORCHVISION_VERSION: ${TORCHVISION_VERSION:-0.21.0}
        INSTALL_FLASH_ATTN: ${INSTALL_FLASH_ATTN:-0}
        TRANSFORMERS_VERSION: ${TRANSFORMERS_VERSION:-4.49.0}
        ULTRALYTICS_VERSION: ${ULTRALYTICS_VERSION:-8.3.101}
        NUMPY_VERSION: ${NUMPY_VERSION:-1.26.4}
        HTTP_PROXY: ${DOCKER_HTTP_PROXY:-}
        HTTPS_PROXY: ${DOCKER_HTTPS_PROXY:-}
        ALL_PROXY: ${DOCKER_ALL_PROXY:-}
        NO_PROXY: ${DOCKER_NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
        http_proxy: ${DOCKER_HTTP_PROXY:-}
        https_proxy: ${DOCKER_HTTPS_PROXY:-}
        all_proxy: ${DOCKER_ALL_PROXY:-}
        no_proxy: ${DOCKER_NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
    gpus: all
    ipc: host
    shm_size: "32gb"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /workspace/MarkIt
    environment:
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      HF_HOME: /models/huggingface
      HUGGINGFACE_HUB_CACHE: /models/huggingface/hub
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      HF_TOKEN: ${HF_TOKEN:-}
      PYTHONUNBUFFERED: "1"
      QWEN25_VL_MODEL_PATH: ${QWEN25_VL_MODEL_PATH:-/models/local/Qwen2.5-VL-7B-Instruct}
      OVERLAY_ROOT: ${OVERLAY_ROOT:-/data/markit_overlay_videos}
      RAW_VIDEO_ROOT: ${RAW_VIDEO_ROOT:-/data/charades/videos}
      TEST_PATH: ${TEST_PATH:-/data/charades/test.json}
      SAVE_PATH: ${SAVE_PATH:-outputs/predictions/charades_markit_qwen25vl.json}
      YOLOE_WEIGHTS_PATH: ${YOLOE_WEIGHTS_PATH:-/models/local/YOLOE-Large/yoloe-v8l-seg.pt}
      MAX_SAMPLES: ${MAX_SAMPLES:--1}
      NUM_SAMPLED_FRAMES: ${NUM_SAMPLED_FRAMES:-32}
      HTTP_PROXY: ${DOCKER_HTTP_PROXY:-}
      HTTPS_PROXY: ${DOCKER_HTTPS_PROXY:-}
      ALL_PROXY: ${DOCKER_ALL_PROXY:-}
      NO_PROXY: ${DOCKER_NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
      http_proxy: ${DOCKER_HTTP_PROXY:-}
      https_proxy: ${DOCKER_HTTPS_PROXY:-}
      all_proxy: ${DOCKER_ALL_PROXY:-}
      no_proxy: ${DOCKER_NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
    volumes:
      # Code is mounted for development. Remove this line for immutable production images.
      - ${MARKIT_CODE_DIR:-.}:/workspace/MarkIt
      # Put local model directories under this host path.
      - ${MARKIT_MODEL_ROOT:-./models}:/models/local:ro
      # Hugging Face cache is writable and shared across container rebuilds.
      - ${HF_CACHE_DIR:-./.cache/huggingface}:/models/huggingface
      # Dataset and generated MarkIt overlays should live under this host path.
      - ${MARKIT_DATA_ROOT:-./data}:/data:${MARKIT_DATA_VOLUME_MODE:-ro}
      # Predictions, temporary rendered videos, and logs.
      - ${MARKIT_OUTPUT_ROOT:-./outputs}:/workspace/MarkIt/outputs
    command: sleep infinity
